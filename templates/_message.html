<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    {% load static %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>
    <div class="parent">
        <div class="child-2">
            <center><h2>Chats</h2></center><hr>
            <div class="chat-body-parent">
                <div class="chat-body" id="tasks">
                    <div class="message" id="chatContainer">
                        {% for i in messages %}
                            <div class="{{ 'send' if i.sender == user.username else 'receive' }}">
                                <p><b>{{ i.sender }}:</b> {{ i.message }}</p>
                            </div>
                        {% endfor %}
                    </div>

                    <div class="form">
                        <form id="message-form">
                            {% csrf_token %}
                            <textarea id="msg" cols="30" rows="3" placeholder="Enter your message" required></textarea>
                            <button type="submit">Send</button>
                        </form>    
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const roomName = "{{ room_name }}";
    const username = "{{ user.username }}";

    // WebSocket connection
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/notification/' + roomName + '/'
    );

    // Receive messages
    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatContainer = document.getElementById("chatContainer");
        chatContainer.innerHTML += 
            '<div class="' + (data.sender === username ? 'send' : 'receive') + '">' +
            '<p><b>' + data.sender + ':</b> ' + data.message + '</p></div>';
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed unexpectedly');
    };

    // Send message
    document.querySelector('#message-form').onsubmit = function(e) {
        e.preventDefault();

        const messageInput = document.getElementById('msg');
        const message = messageInput.value.trim();
        if (!message) return;

        chatSocket.send(JSON.stringify({
            'sender': username,
            'message': message
        }));

        messageInput.value = '';
    };
</script>

<style>
* { padding:0; margin:0; box-sizing:border-box; }

.parent { background-color: #B1A296; display:flex; justify-content:center; align-items:center; width:100%; height:100vh; }
.child-2 { width:50%; margin:10px; border-radius:10px; padding:10px; background-color:#FBEEC1; }
.chat-body-parent { display:flex; justify-content:center; align-items:center; }
.chat-body, .message { width:100%; background-color:#557A95; border-radius:10px; display:flex; flex-direction:column; padding:10px; }
.message { max-height:400px; overflow-y:auto; }
.send, .receive { background-color:#B1A296; max-width:400px; border-radius:10px; padding:10px; margin-bottom:10px; }
.send { align-self:flex-end; }
.receive { align-self:flex-start; }
form { display:flex; justify-content:space-around; align-items:center; margin-top:10px; }
form textarea { width:70%; padding:10px; border-radius:10px; height:40px; }
form button { width:25%; padding:10px; border:none; border-radius:5px; background-color:#FBEEC1; color:#000; }
</style>

</body>
</html>
