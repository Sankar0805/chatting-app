<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
{% load static %}
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>Chat Room</h2>
            <span class="room-name">{{ room_name }}</span>
            <form action="/logout/" method="post" style="display:inline; float:right;">
                {% csrf_token %}
                <button type="submit" style="background:#e74c3c;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;">Logout</button>
            </form>
        </header>
        <main id="chatContainer" class="messages">
            {% for i in messages %}
                {% if i.sender != user %}
                    <div class="bubble left">
                        <span class="sender">{{ i.sender }}</span>
                        <div class="text">{{ i.message }}</div>
                    </div>
                {% else %}
                    <div class="bubble right">
                        <span class="sender">You</span>
                        <div class="text">{{ i.message }}</div>
                    </div>
                {% endif %}
            {% endfor %}
        </main>
        <form id="message-form" autocomplete="off">
            {% csrf_token %}
            <textarea id="msg" name="message" placeholder="Type a message..." required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
<script>
function scrollToBottom() {
    var chatContainer = document.getElementById("chatContainer");
    chatContainer.scrollTop = chatContainer.scrollHeight;
}
window.onload = scrollToBottom;

const websocketProtocol = window.location.protocol === "https:" ? "wss" : "ws";
const wsEndpoint = `${websocketProtocol}://${window.location.host}/ws/notification/{{room_name}}/`;
let socket;
let socketRetry = 0;
function connectSocket() {
    socket = new WebSocket(wsEndpoint);

    socket.addEventListener('open', () => {
        console.log('[WS] connected');
        socketRetry = 0;
    });

    socket.addEventListener('close', (ev) => {
        console.warn('[WS] closed', ev);
        // try reconnect with exponential backoff (max 1 minute)
        socketRetry += 1;
        const delay = Math.min(60000, Math.pow(2, socketRetry) * 1000);
        setTimeout(connectSocket, delay);
    });

    socket.addEventListener('error', (err) => {
        console.error('[WS] error', err);
    });
}
connectSocket();
const currentUser = "{{ user|escapejs }}";

document.getElementById('message-form').addEventListener('submit', function(event){
    event.preventDefault();
    const messageInput = document.getElementById('msg');
    const message = messageInput.value.trim();
    if (!message) return;
    if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
            'message': message,
            'room_name': '{{room_name}}',
            'sender': currentUser,
        }));
    } else {
        console.warn('Socket not open; message not sent');
    }
    messageInput.value = '';
});

socket.addEventListener("message", (event) => {
    const messageData = JSON.parse(event.data)['message'];
    var sender = messageData['sender'];
    var message = messageData['message'];
    var chatContainer = document.getElementById('chatContainer');
    if (sender != currentUser) {
        chatContainer.innerHTML += `
            <div class="bubble left">
                <span class="sender">${sender}</span>
                <div class="text">${message}</div>
            </div>`;
    } else {
        chatContainer.innerHTML += `
            <div class="bubble right">
                <span class="sender">You</span>
                <div class="text">${message}</div>
            </div>`;
    }
    scrollToBottom();
});
</script>
<style>
body {
    background: linear-gradient(135deg, #0a0c12 0%, #162447 100%);
    font-family: 'Roboto', Arial, sans-serif;
    margin: 0;
    padding: 0;
    color: #e3e3e3;
}
.chat-container {
    max-width: 420px;
    margin: 40px auto;
    background: #10131a;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
    min-height: 80vh;
    overflow: hidden;
}
header {
    padding: 24px 28px 12px 28px;
    background: #10131a;
    border-bottom: 1px solid #1f4068;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}
header h2 {
    margin: 0 0 4px 0;
    font-size: 1.4rem;
    color: #4ea1f7;
    font-weight: 700;
}
.room-name {
    font-size: 0.95rem;
    color: #4ea1f7;
    font-weight: 500;
    opacity: 0.8;
}
.messages {
    flex: 1;
    padding: 18px 18px 0 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #0a0c12;
}
.bubble {
    max-width: 80%;
    padding: 10px 16px;
    border-radius: 16px;
    margin-bottom: 2px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    position: relative;
    word-break: break-word;
}
.bubble.left {
    align-self: flex-start;
    background: #162447;
    color: #e3e3e3;
    border: 1px solid #1f4068;
}
.bubble.right {
    align-self: flex-end;
    background: linear-gradient(90deg, #4ea1f7 60%, #162447 100%);
    color: #fff;
}
.sender {
    font-size: 0.85em;
    font-weight: 700;
    margin-bottom: 2px;
    color: #4ea1f7;
    opacity: 0.85;
}
.bubble.right .sender {
    color: #fff;
    opacity: 0.9;
}
.text {
    font-size: 1.05em;
    line-height: 1.5;
}
form {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 18px;
    border-top: 1px solid #1f4068;
    background: #10131a;
}
form textarea {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 1rem;
    resize: none;
    background: #0a0c12;
    color: #e3e3e3;
    min-height: 38px;
    max-height: 80px;
    outline: none;
    transition: box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
}
form textarea:focus {
    box-shadow: 0 2px 8px rgba(78,161,247,0.18);
}
form button {
    background: linear-gradient(90deg, #4ea1f7 60%, #162447 100%);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
}
form button:hover {
    background: linear-gradient(90deg, #162447 60%, #4ea1f7 100%);
    transform: translateY(-2px) scale(1.03);
}
::-webkit-scrollbar {
    width: 8px;
    background: #23242b;
}
::-webkit-scrollbar-thumb {
    background: #181a20;
    border-radius: 8px;
}
@media (max-width: 600px) {
    .chat-container {
        max-width: 100vw;
        min-height: 100vh;
        border-radius: 0;
        margin: 0;
    }
    header, form {
        padding-left: 10px;
        padding-right: 10px;
    }
    .messages {
        padding-left: 8px;
        padding-right: 8px;
    }
}
</style>
</html>
